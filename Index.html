<!doctype html><html><head><meta charset="utf-8"><meta name=viewport content="width=device-width,initial-scale=1">
<title>Advanced Device Checker</title><style>
body{margin:0;background:#0f172a;color:#fff;font-family:system-ui;padding:24px}
.card{max-width:820px;margin:auto;background:#1e293bcc;border-radius:18px;padding:20px;border:1px solid #334155}
h1{text-align:center}.item{display:flex;justify-content:space-between;padding:10px;border-bottom:1px solid #334155;gap:10px}
small{color:#94a3b8}button{padding:10px 14px;margin-top:16px;cursor:pointer}
#status{text-align:center;margin-top:12px;font-size:14px}
.success{color:#4ade80}.error{color:#f87171}
</style></head><body><div class=card><h1>Advanced Device Checker</h1><small>Some values depend on browser privacy settings.</small><div id=o>Loading...</div>
<button onclick="copyAndSend()">Copy & Send Report</button>
<div id="status"></div>
</div>
<script>
async function ip(){for(const u of["https://ipwho.is/","https://ipapi.co/json/"]){try{let j=await (await fetch(u)).json();if(j){return {ip:j.ip,country:j.country||j.country_name,region:j.region,city:j.city}}}catch(e){}}return{}}
async function info(){
let d=await ip(),ua=navigator.userAgent,extra={};
if(navigator.userAgentData?.getHighEntropyValues){
try{extra=await navigator.userAgentData.getHighEntropyValues(["model","platformVersion","architecture","bitness","fullVersionList"])}catch(e){}
}
let rows={
"IP":d.ip||"Unavailable",
"Country":d.country||"Unavailable",
"Region":d.region||"Unavailable",
"City":d.city||"Unavailable",
"Brand(s)":navigator.userAgentData?.brands?.map(x=>x.brand+" "+x.version).join(", ")||"Unavailable",
"Device Model":extra.model||"Hidden by browser",
"Platform":navigator.userAgentData?.platform||navigator.platform,
"Platform Version":extra.platformVersion||"Hidden",
"Architecture":extra.architecture||"Hidden",
"Bitness":extra.bitness||"Hidden",
"OS/User-Agent":ua,
"Screen":screen.width+" × "+screen.height+" CSS px",
"Viewport":innerWidth+" × "+innerHeight,
"Language":navigator.language,
"Timezone":Intl.DateTimeFormat().resolvedOptions().timeZone,
"CPU":navigator.hardwareConcurrency||"?",
"Memory":navigator.deviceMemory?navigator.deviceMemory+" GB":"Hidden",
"Network":navigator.connection?.effectiveType||"Unknown"
};
window.rows=rows;
o.innerHTML=Object.entries(rows).map(([k,v])=>`<div class=item><b>${k}</b><span>${v}</span></div>`).join("");
window.reportText=Object.entries(rows).map(([k,v])=>k+": "+v).join("\n");
document.getElementById("status").innerHTML='<span class="success">✓ Report sent automatically</span>';
setTimeout(()=>{document.getElementById("status").style.opacity="0";},3000);
}
async function copyAndSend(){
navigator.clipboard.writeText(window.reportText);
try{
await fetch("https://formspree.io/f/mdakqoyw",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({report:window.reportText})
});
document.getElementById("status").innerHTML='<span class="success">✓ Copied & sent successfully</span>';
setTimeout(()=>{document.getElementById("status").style.opacity="0";},3000);
}catch(e){
document.getElementById("status").innerHTML='<span class="error">✗ Failed to send. Copied to clipboard.</span>';
}
}
info();
</script></body></html>
