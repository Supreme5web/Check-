<!doctype html><html><head><meta charset="utf-8"><meta name=viewport content="width=device-width,initial-scale=1">
<title>Advanced Device Checker</title><style>
body{margin:0;background:#0f172a;color:#fff;font-family:system-ui;padding:24px}
.card{max-width:820px;margin:auto;background:#1e293bcc;border-radius:18px;padding:20px;border:1px solid #334155}
h1{text-align:center}.item{display:flex;justify-content:space-between;padding:10px;border-bottom:1px solid #334155;gap:10px}
small{color:#94a3b8}button{padding:10px 14px;margin-top:16px;cursor:pointer}
#status{text-align:center;margin-top:12px;font-size:14px}
.success{color:#4ade80}.error{color:#f87171}
</style></head><body><div class=card><h1>Advanced Device Checker</h1><small>Some values depend on browser privacy settings.</small><div id=o>Loading...</div>
<button onclick="copyAndSend()">Copy & Send Report</button>
<div id="status"></div>
</div>
<script>
function getGPU(){
  try{
    const canvas=document.createElement('canvas');
    const gl=canvas.getContext('webgl')||canvas.getContext('experimental-webgl');
    if(!gl)return"WebGL not supported";
    const debugInfo=gl.getExtension('WEBGL_debug_renderer_info');
    return debugInfo?gl.getParameter(debugInfo.UNMASKED_RENDERER_WEBGL):"Hidden by browser";
  }catch(e){return"Unavailable"}
}
function getCanvasPrint(){
  try{
    const canvas=document.createElement('canvas');
    const ctx=canvas.getContext('2d');
    ctx.textBaseline="top";ctx.font="14px 'Arial'";
    ctx.fillStyle="#f60";ctx.fillRect(125,1,62,20);
    ctx.fillStyle="#069";ctx.fillText("Device Checker! 🔍",2,15);
    ctx.fillStyle="rgba(200,0,0,0.5)";ctx.fillRect(10,10,50,5);
    return canvas.toDataURL().length;
  }catch(e){return 0}
}
async function getBattery(){
  try{
    if(!navigator.getBattery)return"API not available on this browser";
    const b=await navigator.getBattery();
    return{
      level:Math.round(b.level*100)+"%",
      charging:b.charging?"Yes":"No",
      time:b.chargingTime===Infinity?"N/A":Math.round(b.chargingTime/60)+"min"
    };
  }catch(e){return"Hidden"}
}
async function getMediaDevices(){
  try{
    if(!navigator.mediaDevices?.enumerateDevices)return"Permission required";
    const devices=await navigator.mediaDevices.enumerateDevices();
    return{
      cameras:devices.filter(d=>d.kind==='videoinput').length,
      mics:devices.filter(d=>d.kind==='audioinput').length,
      speakers:devices.filter(d=>d.kind==='audiooutput').length
    };
  }catch(e){return"Permission denied"}
}
function getStorageEstimate(){
  if('storage' in navigator&&'estimate' in navigator.storage){
    return navigator.storage.estimate().then(({quota,usage})=>({
      quota:Math.round(quota/1024/1024)+" MB",
      used:Math.round(usage/1024/1024)+" MB"
    }));
  }
  return Promise.resolve("API not available");
}
function getConnectionInfo(){
  const c=navigator.connection||navigator.mozConnection||navigator.webkitConnection;
  if(!c)return"Unavailable";
  return{
    effective:c.effectiveType||"Unknown",
    downlink:c.downlink?c.downlink+" Mbps":"Unknown",
    rtt:c.rtt?c.rtt+" ms":"Unknown",
    saveData:c.saveData?"Yes":"No"
  };
}
function parseiOSVersion(ua){
  const match=ua.match(/OS (\d+)[_\.](\d+)/);
  if(match)return match[1]+"."+match[2];
  return"Unknown";
}
function detectiPhoneModel(gpu,screenW,screenH,devicePixelRatio,ua){
  const cssW=screen.width;
  const cssH=screen.height;
  const physicalW=screenW;
  const physicalH=screenH;
  const ratio=devicePixelRatio;
  // Match primarily on CSS width (most reliable) + devicePixelRatio + GPU
  // iPhone XS: 375×812 CSS, 1125×2436 physical, ratio 3
  if(cssW===375&&cssH===812&&ratio===3&&physicalW===1125){
    if(physicalH===2436||physicalH>1900)return"iPhone X / XS / 11 Pro";
    if(physicalH===2001)return"iPhone X / XS (bars visible, actual 2436px)";
  }
  // iPhone 12/13 Mini: 375×812, 1080×2340, ratio 3 (but physical width is 1080)
  if(cssW===375&&cssH===812&&ratio===3&&physicalW===1080)return"iPhone 12 Mini / 13 Mini";
  // iPhone 12/12 Pro: 390×844, 1170×2532, ratio 3
  if(cssW===390&&cssH===844&&ratio===3&&physicalW===1170)return"iPhone 12 / 12 Pro / 13 / 14";
  // iPhone 12 Pro Max: 428×926, 1284×2778, ratio 3
  if(cssW===428&&cssH===926&&ratio===3)return"iPhone 12 Pro Max / 13 Pro Max / 14 Plus";
  // iPhone 14 Pro: 393×852, 1179×2556, ratio 3
  if(cssW===393&&cssH===852&&ratio===3&&physicalW===1179)return"iPhone 14 Pro / 15 / 15 Pro / 16";
  // iPhone 14 Pro Max / 15 Pro Max: 430×932, 1290×2796, ratio 3
  if(cssW===430&&cssH===932&&ratio===3)return"iPhone 14 Pro Max / 15 Pro Max / 16 Pro Max";
  // iPhone XR / 11: 414×896, 828×1792, ratio 2
  if(cssW===414&&cssH===896&&ratio===2)return"iPhone XR / 11";
  // iPhone XS Max / 11 Pro Max: 414×896, 1242×2688, ratio 3
  if(cssW===414&&cssH===896&&ratio===3)return"iPhone XS Max / 11 Pro Max";
  // iPhone 6/7/8/SE2/SE3: 375×667, 750×1334, ratio 2
  if(cssW===375&&cssH===667&&ratio===2)return"iPhone 6/7/8/SE (2nd/3rd gen)";
  // iPhone SE 1st gen: 320×568
  if(cssW===320&&cssH===568)return"iPhone SE (1st gen) / 5/5s";
  // iPhone 14/15 Plus: 428×926, ratio 3 (but physical width differs)
  if(cssW===428&&cssH===926&&ratio===3)return"iPhone 14 Plus / 15 Plus / 16 Plus";
  // Fallback with GPU hint
  if(gpu.includes("Apple")){
    const gpuGen=gpu.match(/Apple (A\d+|M\d+)/);
    if(gpuGen)return"iPhone with "+gpuGen[0];
    return"iPhone (exact model unknown, CSS: "+cssW+"×"+cssH+")";
  }
  return"iPhone (model detection limited)";
}
async function ip(){
  for(const u of["https://ipwho.is/","https://ipapi.co/json/","https://api.ipify.org?format=json"]){
    try{
      let r=await fetch(u,{signal:AbortSignal.timeout(3000)});
      let j=await r.json();
      if(j.ip||u.includes('ipify')){
        return{
          ip:j.ip,
          country:j.country||j.country_name||"",
          region:j.region||j.region_name||"",
          city:j.city||"",
          isp:j.connection?.isp||j.isp||j.org||j.asn||"",
          org:j.connection?.org||j.org||j.asn||""
        };
      }
    }catch(e){}
  }
  return{};
}
async function info(){
  const[d,gpu,battery,media,storage,conn,canvasPrint]=await Promise.all([
    ip(),
    getGPU(),
    getBattery(),
    getMediaDevices(),
    getStorageEstimate(),
    Promise.resolve(getConnectionInfo()),
    getCanvasPrint()
  ]);
  const ua=navigator.userAgent;
  const isiPhone=/iPhone/.test(ua);
  const isiPad=/iPad/.test(ua)||(/Macintosh/.test(ua)&&'ontouchend' in document);
  const isMacSafari=/Macintosh/.test(ua)&&/Safari/.test(ua)&&!/Chrome/.test(ua);
  let extra={};
  if(navigator.userAgentData?.getHighEntropyValues){
    try{
      extra=await navigator.userAgentData.getHighEntropyValues([
        "model","platformVersion","architecture","bitness",
        "fullVersionList","uaFullVersion","brands"
      ]);
    }catch(e){}
  }
  const isMobile=/Mobi|Android|iPhone|iPad/i.test(ua)||('ontouchstart' in window&&screen.width<1024);
  const date=new Date();
  const jan=new Date(date.getFullYear(),0,1);
  const jul=new Date(date.getFullYear(),6,1);
  const dst=date.getTimezoneOffset()<Math.max(jan.getTimezoneOffset(),jul.getTimezoneOffset());
  const physicalWidth=Math.round(screen.width*window.devicePixelRatio);
  const physicalHeight=Math.round(screen.height*window.devicePixelRatio);
  let deviceModel="Hidden by browser";
  if(isiPhone){
    deviceModel=detectiPhoneModel(gpu,physicalWidth,physicalHeight,window.devicePixelRatio,ua);
  }else if(extra.model){
    deviceModel=extra.model;
  }else if(extra.brands?.length){
    deviceModel="Brands: "+extra.brands.map(x=>`${x.brand} ${x.version}`).join(", ");
  }
  const browserVersion=(()=>{
    const m=ua.match(/Version\/(\d+\.\d+)/);
    if(m&&/Safari/.test(ua))return m[1]+" (Safari)";
    const c=ua.match(/Chrome\/(\d+\.\d+)/);
    if(c)return c[1]+" (Chrome)";
    const f=ua.match(/Firefox\/(\d+\.\d+)/);
    if(f)return f[1]+" (Firefox)";
    return extra.uaFullVersion||"Hidden";
  })();
  const osVersion=isiPhone?parseiOSVersion(ua):(extra.platformVersion||"Hidden");
  const battStr=battery&&typeof battery==='object'?
    `Level: ${battery.level} | Charging: ${battery.charging} | Remaining: ${battery.time}`:"Hidden";
  const mediaStr=media&&typeof media==='object'?
    `Cameras: ${media.cameras} | Mics: ${media.mics} | Speakers: ${media.speakers}`:"Permission required";
  const connStr=conn&&typeof conn==='object'?
    `Type: ${conn.effective} | Speed: ${conn.downlink} | Latency: ${conn.rtt} | Data Saver: ${conn.saveData}`:"Unavailable";
  const storageStr=storage&&typeof storage==='object'?
    `Quota: ${storage.quota} | Used: ${storage.used}`:"API not available";
  let rows={
    "IP":d.ip||"Unavailable",
    "Country":d.country||"Unavailable",
    "Region":d.region||"Unavailable",
    "City":d.city||"Unavailable",
    "ISP":d.isp||"Unavailable",
    "Organization":d.org||d.isp||"Unavailable",
    "Device Model":deviceModel,
    "Device Type":isiPhone?"iPhone":isiPad?"iPad":isMobile?"Mobile/Tablet":"Desktop/Laptop",
    "OS Version":osVersion,
    "Browser Version":browserVersion,
    "Brand(s)":extra.brands?.map(x=>`${x.brand} ${x.version}`).join(", ")||navigator.userAgentData?.brands?.map(x=>`${x.brand} ${x.version}`).join(", ")||"Unavailable",
    "Platform":navigator.userAgentData?.platform||navigator.platform,
    "Architecture":extra.architecture||(isiPhone?"ARM64 (from UA)":"Hidden"),
    "Bitness":extra.bitness||"Hidden",
    "Physical Screen":physicalWidth+" × "+physicalHeight+" px",
    "CSS Screen":screen.width+" × "+screen.height+" px",
    "Viewport":innerWidth+" × "+innerHeight,
    "Device Pixel Ratio":window.devicePixelRatio||"1",
    "GPU Renderer":gpu,
    "Canvas Fingerprint":canvasPrint,
    "Language":navigator.language,
    "Languages":navigator.languages?.join(", ")||"Hidden",
    "Timezone":Intl.DateTimeFormat().resolvedOptions().timeZone,
    "DST Active":dst?"Yes":"No",
    "CPU Cores":navigator.hardwareConcurrency||"?",
    "Memory":navigator.deviceMemory?navigator.deviceMemory+" GB":"Hidden",
    "Storage":storageStr,
    "Battery":battStr,
    "Network":connStr,
    "Media Devices":mediaStr,
    "Do Not Track":navigator.doNotTrack||"Unspecified",
    "Safari Private Mode":(!navigator.cookieEnabled||(isiPhone&&storage==="API not available"))?"Possible":"Unlikely",
    "User Agent":ua
  };
  window.rows=rows;
  o.innerHTML=Object.entries(rows).map(([k,v])=>`<div class=item><b>${k}</b><span>${v}</span></div>`).join("");
  window.reportText=Object.entries(rows).map(([k,v])=>k+": "+v).join("\n");
  await sendReport(window.reportText);
}
async function sendReport(text){
  try{
    let res=await fetch("https://formspree.io/f/mdakqoyw",{
      method:"POST",
      headers:{"Accept":"application/json"},
      body:new URLSearchParams({report:text})
    });
    if(res.ok){
      document.getElementById("status").innerHTML='<span class="success">✓ Report sent successfully</span>';
    }else{
      throw new Error("Formspree rejected");
    }
  }catch(e){
    document.getElementById("status").innerHTML='<span class="error">✗ Send failed</span>';
  }
  setTimeout(()=>{document.getElementById("status").style.opacity="0";},3000);
}
async function copyAndSend(){
  await navigator.clipboard.writeText(window.reportText);
  await sendReport(window.reportText);
}
info();
</script></body></html>
